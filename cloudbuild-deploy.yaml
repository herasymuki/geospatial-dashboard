steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--no-cache'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/gcas-repo/global-conflicts-athena-service:$BUILD_ID'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/gcas-repo/global-conflicts-athena-service:latest'
      - '.'
    timeout: '1200s'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/gcas-repo/global-conflicts-athena-service'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'global-conflicts-athena-service'
      - '--image=us-central1-docker.pkg.dev/$PROJECT_ID/gcas-repo/global-conflicts-athena-service:$BUILD_ID'
      - '--region=us-central1'
      - '--project=$PROJECT_ID'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=1Gi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=5'
      - '--set-secrets=GCAS_ANTHROPIC_KEY=gcas_anthropic_key:latest,GCAS_OPENAI_KEY=gcas_openai_key:latest,GCAS_GEMINI_KEY=gcas_gemini_key:latest,GCAS_ATHENA_KEY=gcas_athena_key:latest,GCAS_ACLED_KEY=gcas_acled_key:latest,GCAS_ACLED_EMAIL=gcas_acled_email:latest'

images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/gcas-repo/global-conflicts-athena-service:$BUILD_ID'
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/gcas-repo/global-conflicts-athena-service:latest'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'
  pool: {}
