steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/global-conflicts-athena-service:$COMMIT_SHA'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/global-conflicts-athena-service:$COMMIT_SHA'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'global-conflicts-athena-service'
      - '--image=gcr.io/$PROJECT_ID/global-conflicts-athena-service:$COMMIT_SHA'
      - '--region=us-central1'
      - '--project=s4d-athena-hosting'
      - '--allow-unauthenticated'
      - '--memory=1Gi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=5'

images:
  - 'gcr.io/$PROJECT_ID/global-conflicts-athena-service:$COMMIT_SHA'
