steps:
- name: 'node:20-alpine'
  entrypoint: 'sh'
  args:
    - '-c'
    - |
      cd /workspace
      npm install --legacy-peer-deps
      npm run build
  env:
    - 'NODE_ENV=production'

- name: 'gcr.io/cloud-builders/docker'
  args:
    - 'build'
    - '-t'
    - 'gcr.io/$PROJECT_ID/global-conflicts-athena-service:$BUILD_ID'
    - '-t'
    - 'gcr.io/$PROJECT_ID/global-conflicts-athena-service:latest'
    - '-f'
    - 'Dockerfile.prod'
    - '.'

images:
  - 'gcr.io/$PROJECT_ID/global-conflicts-athena-service:latest'
  - 'gcr.io/$PROJECT_ID/global-conflicts-athena-service:$BUILD_ID'

timeout: '1200s'
options:
  machineType: 'E2_HIGHCPU_8'
